<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./img/logo.png" type="image/x-icon">
    <title>Questionario</title>
</head>

<body>
    <div id="painel_vida" aria-label="Painel de vida">
        <div id="containerVidas">
            <div class="coracoes_vida"></div>
            <div class="coracoes_vida"></div>
            <div class="coracoes_vida"></div>
        </div>
    </div>

    <div id="arena">
        <div id="fundo_cima"></div>
        <div id="fundo_baixo"></div>
        <div id="personagem"></div>
    </div>

    <div id="questao" style="display: none;">
        <p id="tempo">10.00</p>
        <p id="pergunta">Qual é a unidade central de processamento para o computador poder fazer os processamentos?</p>
    </div>
    <div id="opcoes" style="display: none;">
        <div id="container_opcoes">
            <img src="./img/fotosQuestoes/ula.png" alt="Opção 1" class="opcao" id="opcao1">
            <img src="./img/fotosQuestoes/cpu.jpg" alt="Opção 2" class="opcao" id="opcao2">
            <img src="./img/fotosQuestoes/dma.jpg" alt="Opção 3" class="opcao" id="opcao3">
        </div>
    </div>
    <div id="parede_proxima" style="display: none;">
        <img src="./img/seta.svg" alt="" id="seta_proxima">
    </div>
    <script src="script.js"></script>
</body>

</html>
